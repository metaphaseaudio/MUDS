name: Build Windows Installer

on:
  workflow_call:
    inputs:
      company:
        required: true
        type: string
      plugin:
        required: true
        type: string
      version:
        required: true
        type: string
      has-webview:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '18'
      web-dir:
        required: false
        type: string
        default: ''
      muds-path:
        required: false
        type: string
        default: src/shared/MUDS
    secrets:
      SIGNING_CERT:
        required: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        if: inputs.has-webview
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.web-dir }}/package-lock.json

      - name: Install Inno Setup, CMake, and Ninja
        run: choco install innosetup cmake ninja -y

      - name: Add Inno Setup and CMake to PATH
        shell: bash
        run: |
          echo "C:/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"
          echo "C:/Program Files/CMake/bin" >> "$GITHUB_PATH"

      - name: Setup Strawberry Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
          distribution: strawberry

      - name: Disable Strawberry C toolchain binaries
        shell: pwsh
        run: |
          # Strawberry Perl bundles cmake, ninja, gcc, etc. in its c\bin.
          # Rename them so they can't shadow the MSVC toolchain.
          # We avoid modifying PATH via GITHUB_ENV because that clobbers
          # environment changes made by subsequent actions (e.g. ilammy/msvc-dev-cmd).
          $strawberryBin = (Get-Command perl).Source | Split-Path | Split-Path | Split-Path
          $cBin = Join-Path $strawberryBin 'c\bin'
          if (Test-Path $cBin) {
            Get-ChildItem $cBin -Filter 'cmake*' | Rename-Item -NewName { $_.Name + '.disabled' }
            Get-ChildItem $cBin -Filter 'ninja*' | Rename-Item -NewName { $_.Name + '.disabled' }
            Get-ChildItem $cBin -Filter 'gmake*' | Rename-Item -NewName { $_.Name + '.disabled' }
            Get-ChildItem $cBin -Filter 'gcc*'   | Rename-Item -NewName { $_.Name + '.disabled' }
            Get-ChildItem $cBin -Filter 'g++*'   | Rename-Item -NewName { $_.Name + '.disabled' }
            Get-ChildItem $cBin -Filter 'c++*'   | Rename-Item -NewName { $_.Name + '.disabled' }
          }

      - name: Setup MSVC Developer Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Hide MSYS2 link.exe to prevent PATH conflict with MSVC linker
        shell: bash
        run: |
          # Git Bash ships /usr/bin/link (Unix hard-link utility) which shadows
          # the MSVC link.exe when nmake invokes "link" during the OpenSSL build.
          if [ -f /usr/bin/link ]; then
            mv /usr/bin/link /usr/bin/link.disabled
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r ${{ inputs.muds-path }}/installer_builder/requirements.txt

      - name: Create build directory
        shell: bash
        run: mkdir -p src/build-release/_deps

      - name: Cache OpenSSL
        uses: actions/cache@v4
        with:
          path: src/build-release/_deps/openssl
          key: openssl-3.2.0-${{ runner.os }}-x64-${{ hashFiles('src/shared/MUDS/cmake_snippets/BuildOpenSSL.cmake') }}

      - name: Build
        shell: bash
        env:
          PYTHONPATH: ${{ inputs.muds-path }}
          PYTHONUNBUFFERED: "1"
        run: >
          python -m installer_builder
          --company "${{ inputs.company }}"
          --plugin "${{ inputs.plugin }}"
          --version "${{ inputs.version }}"
          ${{ inputs.has-webview && format('--web-dir {0}', inputs.web-dir) || '--skip-web-ui' }}
          ${{ secrets.SIGNING_CERT && format('--signing-cert "{0}"', secrets.SIGNING_CERT) || '' }}
          -v

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installers/windows/*.exe
