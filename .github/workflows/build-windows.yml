name: Build Windows Installer

on:
  workflow_call:
    inputs:
      company:
        required: true
        type: string
      plugin:
        required: true
        type: string
      version:
        required: true
        type: string
      has-webview:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '18'
      web-dir:
        required: false
        type: string
        default: ''
      muds-path:
        required: false
        type: string
        default: src/shared/MUDS
    secrets:
      SIGNING_CERT:
        required: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        if: inputs.has-webview
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.web-dir }}/package-lock.json

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Add Inno Setup to PATH
        shell: bash
        run: echo "C:/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"

      - name: Remove MSYS2 Perl and prefer Strawberry Perl
        shell: pwsh
        run: |
          # Remove all MSYS2/Git paths that contain perl from PATH to prevent conflicts
          $currentPath = [Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [Environment]::GetEnvironmentVariable("Path", "User")
          
          # Add Strawberry Perl first
          echo "C:\Strawberry\perl\bin" >> $env:GITHUB_PATH
          
          # Remove MSYS2 usr/bin which contains conflicting perl
          # This writes to GITHUB_PATH so it takes effect in subsequent steps
          $msysPerl = "C:\msys64\usr\bin"
          if (Test-Path $msysPerl\perl.exe) {
            # Rename the MSYS2 perl so it can never be found
            Rename-Item "$msysPerl\perl.exe" "$msysPerl\perl.exe.bak" -Force
            Write-Host "Renamed MSYS2 perl to prevent conflicts"
          }
          
          # Verify correct Perl is active
          & "C:\Strawberry\perl\bin\perl.exe" -v
          & "C:\Strawberry\perl\bin\perl.exe" -e "use Locale::Maketext::Simple; print qq{Locale::Maketext::Simple OK\n}"

      - name: Setup MSVC Developer Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r ${{ inputs.muds-path }}/installer_builder/requirements.txt

      - name: Build
        shell: bash
        env:
          PYTHONPATH: ${{ inputs.muds-path }}
          PYTHONUNBUFFERED: "1"
        run: >
          python -m installer_builder
          --company "${{ inputs.company }}"
          --plugin "${{ inputs.plugin }}"
          --version "${{ inputs.version }}"
          ${{ inputs.has-webview && format('--web-dir {0}', inputs.web-dir) || '--skip-web-ui' }}
          ${{ secrets.SIGNING_CERT && format('--signing-cert "{0}"', secrets.SIGNING_CERT) || '' }}
          -v

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installers/windows/*.exe
