name: Build Windows Installer

on:
  workflow_call:
    inputs:
      company:
        required: true
        type: string
      plugin:
        required: true
        type: string
      version:
        required: true
        type: string
      has-webview:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '18'
      web-dir:
        required: false
        type: string
        default: ''
      muds-path:
        required: false
        type: string
        default: src/shared/MUDS
    secrets:
      SIGNING_CERT:
        required: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        if: inputs.has-webview
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.web-dir }}/package-lock.json

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Add Inno Setup to PATH
        shell: bash
        run: echo "C:/Program Files (x86)/Inno Setup 6" >> "$GITHUB_PATH"

      - name: Setup Strawberry Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'
          distribution: strawberry

      - name: Remove Strawberry C toolchain from PATH
        shell: pwsh
        run: |
          # Remove strawberry c\bin from GITHUB_PATH and current PATH
          $strawberryBin = (Get-Command perl).Source | Split-Path | Split-Path
          $cBin = Join-Path $strawberryBin 'c\bin'
          if (Test-Path $cBin) {
            # Rename cmake/ninja so they can't shadow MSVC tools
            Get-ChildItem $cBin -Filter 'cmake*' | Rename-Item -NewName { $_.Name + '.disabled' }
            Get-ChildItem $cBin -Filter 'ninja*' | Rename-Item -NewName { $_.Name + '.disabled' }
            Get-ChildItem $cBin -Filter 'gmake*' | Rename-Item -NewName { $_.Name + '.disabled' }
          }
          # Also strip from PATH for this and subsequent steps
          $cleaned = ($env:PATH -split ';' | Where-Object {
            $_ -notmatch 'strawberry.*\\c\\bin'
          }) -join ';'
          echo "PATH=$cleaned" >> $env:GITHUB_ENV

      - name: Setup MSVC Developer Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install -r ${{ inputs.muds-path }}/installer_builder/requirements.txt

      - name: Build
        shell: bash
        env:
          PYTHONPATH: ${{ inputs.muds-path }}
          PYTHONUNBUFFERED: "1"
        run: >
          python -m installer_builder
          --company "${{ inputs.company }}"
          --plugin "${{ inputs.plugin }}"
          --version "${{ inputs.version }}"
          ${{ inputs.has-webview && format('--web-dir {0}', inputs.web-dir) || '--skip-web-ui' }}
          ${{ secrets.SIGNING_CERT && format('--signing-cert "{0}"', secrets.SIGNING_CERT) || '' }}
          -v

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installers/windows/*.exe
