name: Create Release

on:
  workflow_call:
    inputs:
      is-release:
        required: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    if: inputs.is-release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
